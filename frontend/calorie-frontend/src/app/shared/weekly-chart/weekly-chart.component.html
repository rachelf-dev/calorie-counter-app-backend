<mat-card appearance="outlined" class="weekly-chart-card">
  <mat-card-header>
    <mat-card-title>7 הימים האחרונים</mat-card-title>
    <mat-card-subtitle>משמאל (ישן) לימין (היום)</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    @if (hasChartData()) {
      <div class="chart-container" dir="ltr">
        <canvas
          baseChart
          [type]="'bar'"
          [data]="chartData"
          [options]="chartOptions"
          [legend]="true"
        ></canvas>
      </div>
    } @else if (!loading()) {
      <p class="chart-empty">אין עדיין נתונים לגרף. הוסיפי מוצרים לסל.</p>
    }
  </mat-card-content>
</mat-card>
